---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  name: stripepaymentmethods.stripe.billing.miloapis.com
spec:
  group: stripe.billing.miloapis.com
  names:
    kind: StripePaymentMethod
    listKind: StripePaymentMethodList
    plural: stripepaymentmethods
    singular: stripepaymentmethod
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.paymentMethodRef.name
      name: PaymentMethod
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.setupIntent.id
      name: SetupIntent
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          StripePaymentMethod is the Schema for the stripepaymentmethods API.

          StripePaymentMethod is a provider-owned child resource of a billing
          PaymentMethod. The stripe-provider creates it with an ownerReference
          pointing at the parent PaymentMethod so Kubernetes garbage collection
          cascades deletion. All Stripe-specific identifiers — customer ID,
          SetupIntent client secret, payment-method ID — live here exclusively.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: StripePaymentMethodSpec defines the desired state of a StripePaymentMethod.
            properties:
              paymentMethodRef:
                description: |-
                  PaymentMethodRef is the name of the parent
                  billing.miloapis.com PaymentMethod in the same namespace. The
                  stripe-provider always sets this when creating the resource as an
                  owner-referenced child of the PaymentMethod.
                properties:
                  name:
                    description: Name is the name of the PaymentMethod.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
            required:
            - paymentMethodRef
            type: object
          status:
            description: StripePaymentMethodStatus defines the observed state of a
              StripePaymentMethod.
            properties:
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              confirmedAt:
                description: ConfirmedAt is the timestamp Stripe confirmed the SetupIntent.
                format: date-time
                type: string
              failureMessage:
                type: string
              failureReason:
                description: FailureReason / FailureMessage are populated when phase
                  is Failed.
                type: string
              instrument:
                description: |-
                  Instrument carries Stripe-side metadata for the confirmed payment
                  instrument. The provider projects a normalized subset onto
                  billing PaymentMethod.status.details.
                properties:
                  card:
                    description: Card is populated when Type is card.
                    properties:
                      avsResult:
                        type: string
                      brand:
                        type: string
                      country:
                        type: string
                      cvcResult:
                        type: string
                      expiryMonth:
                        format: int32
                        type: integer
                      expiryYear:
                        format: int32
                        type: integer
                      issuerIdentificationNumber:
                        type: string
                      last4:
                        type: string
                    type: object
                  type:
                    description: Type identifies the instrument category.
                    enum:
                    - card
                    - usBankAccount
                    type: string
                  usBankAccount:
                    description: USBankAccount is populated when Type is usBankAccount.
                    properties:
                      accountType:
                        type: string
                      bankName:
                        type: string
                      last4:
                        type: string
                    type: object
                type: object
              observedGeneration:
                description: |-
                  ObservedGeneration is the most recent generation observed by the
                  controller.
                format: int64
                type: integer
              phase:
                description: Phase represents the current lifecycle phase.
                enum:
                - Initializing
                - AwaitingConfirmation
                - Active
                - Failed
                type: string
              setupIntent:
                description: SetupIntent captures the in-flight setup session.
                properties:
                  clientSecret:
                    description: |-
                      ClientSecret is the single-use secret consumed by the portal to
                      initialize Stripe Elements. Treated as sensitive; least-privilege
                      access on this CRD is the access boundary.
                    type: string
                  expiresAt:
                    description: |-
                      ExpiresAt is the expiry of the SetupIntent client secret. The
                      controller creates a fresh SetupIntent when this elapses without
                      confirmation.
                    format: date-time
                    type: string
                  id:
                    description: ID is the Stripe SetupIntent identifier (e.g. `seti_…`).
                    type: string
                  status:
                    description: |-
                      Status is the most recent upstream SetupIntent status string
                      (`requires_payment_method`, `requires_action`, `succeeded`, ...).
                    type: string
                type: object
              stripeCustomerId:
                description: |-
                  StripeCustomerID is the Stripe customer ID for the owning billing
                  account. Reused across all StripePaymentMethods for the same
                  account.
                type: string
              stripePaymentMethodId:
                description: |-
                  StripePaymentMethodID is the confirmed Stripe payment method ID
                  (`pm_…`). Populated when the SetupIntent succeeds.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

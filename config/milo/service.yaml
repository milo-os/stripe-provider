# Registers the stripe-provider API group as a milo Service so its
# CRDs can carry IAM ProtectedResource bindings. Companion to
# billing's `billing-miloapis-com` Service: the portal walks the
# parametersRef chain off PaymentMethodClass into this group to
# resolve the Stripe publishable key (see
# milo-os/billing/docs/enhancements/payment-methods.md, step 6).
apiVersion: services.miloapis.com/v1alpha1
kind: Service
metadata:
  name: stripe-billing-miloapis-com
  labels:
    app.kubernetes.io/name: stripe-provider
    app.kubernetes.io/managed-by: kustomize
spec:
  serviceName: stripe.billing.miloapis.com
  displayName: Stripe Billing Provider
  description: >-
    Stripe payment provider for the Datum Cloud billing service.
    Owns StripeProviderConfig (cluster-scoped SDK configuration) and
    StripePaymentMethod (per-customer setup state).

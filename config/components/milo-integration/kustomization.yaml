apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# milo-integration shapes the stripe-provider manager Deployment for use
# against a Milo control plane. It is intentionally generic — every
# environment-specific value (cert-manager ClusterIssuer name, trust-bundle
# ConfigMap name, client-cert subject identity, etc.) is left to the
# deployment overlay.
#
# What this component does:
#
#   - Removes the upstream Secret-source `webhook-tls` volume + mount so the
#     deployment overlay can replace it cleanly with whatever cert source
#     it prefers (typically a cert-manager CSI volume).
#   - Sets KUBECONFIG=/etc/kubernetes/project-discovery/auth/kubeconfig.yaml
#     so ctrl.GetConfigOrDie() reads a mounted kubeconfig and the controller
#     talks to Milo for every resource — its own CRDs, billing's CRDs, and
#     leader-election Leases.
#   - Overrides LEADER_ELECT_NAMESPACE to milo-system because the upstream
#     default (kube-system) does not exist on Milo.
#
# What the deployment overlay must add (env-specific, see datum/infra for a
# worked example):
#
#   - A `webhook-tls` volume + mount that the controller-runtime webhook
#     server can serve from at /tmp/k8s-webhook-server/serving-certs.
#   - A `client-cert` volume + mount at /etc/kubernetes/projects/pki/client
#     containing the cert the kubeconfig authenticates with.
#   - A `discovery-kubeconfig` volume + mount at
#     /etc/kubernetes/project-discovery/auth referencing a ConfigMap that
#     contains the kubeconfig pointed at by KUBECONFIG above.
#   - A `trust-bundle` volume + mount at /etc/kubernetes/pki/trust
#     containing the CA the kubeconfig references for server verification.

patches:
  # Remove the base Secret-based webhook-tls volume and volumeMount so the
  # deployment overlay can add its own replacement without colliding. A
  # strategic merge of same-named volumes would produce an invalid spec
  # with both `secret:` and (overlay's) `csi:` sources set on the same
  # Volume.
  - target:
      kind: Deployment
      name: stripe-provider
    patch: |-
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts/0
      - op: remove
        path: /spec/template/spec/volumes/0

  # Set the env vars that wire the controller to a mounted Milo kubeconfig.
  # Only the env list is touched here — the volume sources / mount paths
  # the kubeconfig references are an overlay concern.
  - target:
      kind: Deployment
      name: stripe-provider
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: stripe-provider
      spec:
        template:
          spec:
            containers:
              - name: manager
                env:
                  - name: KUBECONFIG
                    value: /etc/kubernetes/project-discovery/auth/kubeconfig.yaml
                  - name: LEADER_ELECT_NAMESPACE
                    value: milo-system
